<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音域回响 · Sonic Topography</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #root { width: 100%; height: 100%; }
      #browser-audio-bridge {
        position: fixed; z-index: 99999; left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        display: grid; justify-items: center; gap: 12px;
        padding: 22px 26px; border: 1px solid rgba(167, 126, 255, .24);
        border-radius: 18px; color: #ddd6fe;
        background: rgba(8, 5, 24, .76); backdrop-filter: blur(22px);
        box-shadow: 0 24px 90px rgba(0, 0, 0, .52), 0 0 50px rgba(122, 73, 255, .1);
        font: 13px/1.5 system-ui, sans-serif;
      }
      #browser-audio-bridge button {
        border: 0; border-radius: 999px; padding: 12px 22px; cursor: pointer;
        color: #160c2c; font-weight: 650;
        background: linear-gradient(110deg, #f5e9ff, #cbb9ff 55%, #ffcfbd);
        box-shadow: 0 8px 28px rgba(148, 105, 255, .25);
      }
      #browser-audio-bridge small { color: #80769d; font-size: 10px; }
      #browser-audio-bridge.is-connected { display: none; }
      #browser-audio-error { color: #ffb7b7; max-width: 330px; text-align: center; }
      #browser-settings-toggle {
        position: fixed; z-index: 99990; left: 18px; bottom: 18px;
        width: 42px; height: 42px; border: 1px solid rgba(255,255,255,.12);
        border-radius: 50%; color: rgba(255,255,255,.76); cursor: pointer;
        background: rgba(8,5,24,.62); backdrop-filter: blur(16px); font-size: 18px;
      }
      #browser-settings-panel {
        position: fixed; z-index: 99998; top: 0; right: 0; bottom: 0;
        width: min(390px, 92vw); padding: 18px;
        color: #ddd7ef; background: rgba(7,5,18,.9); backdrop-filter: blur(26px);
        border-left: 1px solid rgba(255,255,255,.08);
        transform: translateX(102%); transition: transform .28s ease;
        font: 12px/1.4 system-ui, sans-serif; overflow-y: auto;
      }
      #browser-settings-panel.is-open { transform: translateX(0); }
      .browser-settings-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
      .browser-settings-head strong { font-size:14px; letter-spacing:.08em; }
      #browser-gpu-renderer {
        display:block; max-width:235px; margin-top:4px; overflow:hidden;
        color:#746a91; font:9px/1.3 ui-monospace,monospace; text-overflow:ellipsis; white-space:nowrap;
      }
      .browser-settings-head button, #browser-settings-reset {
        border:0; background:none; color:#9c91bb; cursor:pointer; padding:7px;
      }
      #browser-settings-body section { padding: 12px 0; border-top: 1px solid rgba(255,255,255,.06); }
      #browser-settings-body h3 { margin:0 0 11px; color:#8b7db8; font-size:10px; letter-spacing:.14em; font-weight:600; }
      .browser-setting-row { display:grid; grid-template-columns: 1fr 155px; align-items:center; gap:12px; min-height:34px; }
      .browser-setting-row > span { color:rgba(255,255,255,.63); }
      .browser-setting-row select {
        width:100%; padding:6px 8px; border:1px solid rgba(255,255,255,.1); border-radius:6px;
        color:#ddd7ef; background:#110d22;
      }
      .browser-setting-row input[type="checkbox"] { justify-self:end; width:16px; height:16px; accent-color:#9b78ff; }
      .browser-range-control { display:grid; grid-template-columns:1fr 37px; align-items:center; gap:8px; }
      .browser-range-control input { width:100%; accent-color:#a27dff; }
      .browser-range-control output { color:#9f91c7; text-align:right; font:10px ui-monospace,monospace; }
      .browser-settings-foot { display:flex; justify-content:flex-end; padding:8px 0 18px; }
    </style>
    <script>
      // 立即注册 Wallpaper Engine Media Integration 回调
      // 必须在脚本加载时立即注册，不能延迟到 onload 或模块加载后
      window.__mediaState = {
        title: '',
        artist: '',
        thumbnail: '',
        primaryColor: '',
        textColor: '',
        isPlaying: false,
        position: 0,
        duration: 0,
        _callbacks: []
      };

      window.__notifyMediaChange = function() {
        window.__mediaState._callbacks.forEach(function(cb) {
          cb({
            title: window.__mediaState.title,
            artist: window.__mediaState.artist,
            thumbnail: window.__mediaState.thumbnail,
            primaryColor: window.__mediaState.primaryColor,
            textColor: window.__mediaState.textColor,
            isPlaying: window.__mediaState.isPlaying,
            position: window.__mediaState.position,
            duration: window.__mediaState.duration
          });
        });
      };

      if (window.wallpaperRegisterMediaPropertiesListener) {
        window.wallpaperRegisterMediaPropertiesListener(function(props) {
          window.__mediaState.title = props.title || '';
          window.__mediaState.artist = props.artist || '';
          window.__mediaState.position = 0;
          window.__mediaState.duration = 0;
          window.__notifyMediaChange();
        });
      }

      if (window.wallpaperRegisterMediaThumbnailListener) {
        window.wallpaperRegisterMediaThumbnailListener(function(thumb) {
          window.__mediaState.thumbnail = thumb.thumbnail || '';
          window.__mediaState.primaryColor = thumb.primaryColor || '';
          window.__mediaState.textColor = thumb.textColor || '';
          window.__notifyMediaChange();
        });
      }

      if (window.wallpaperRegisterMediaPlaybackListener) {
        window.wallpaperRegisterMediaPlaybackListener(function(pb) {
          var PLAYING = (window.wallpaperMediaIntegration && window.wallpaperMediaIntegration.PLAYBACK_PLAYING) || 0;
          window.__mediaState.isPlaying = pb.state === PLAYING;
          window.__notifyMediaChange();
        });
      }

      if (window.wallpaperRegisterMediaTimelineListener) {
        window.wallpaperRegisterMediaTimelineListener(function(tl) {
          window.__mediaState.position = tl.position || 0;
          window.__mediaState.duration = tl.duration || 0;
          window.__notifyMediaChange();
        });
      }
    </script>
    <script type="module" src="/audio-bridge.js"></script>
    <script type="module" crossorigin src="/vendor/sonic-topography/wallpaper.js"></script>
    <link rel="stylesheet" crossorigin href="/vendor/sonic-topography/wallpaper.css">
  </head>
  <body>
    <div id="root"></div>
    <div id="browser-audio-bridge">
      <span>连接 QQ 音乐的系统输出</span>
      <button id="browser-audio-connect">共享系统音频</button>
      <small>请在弹窗中勾选“共享系统音频”</small>
      <div id="browser-audio-error" role="alert"></div>
    </div>
    <button id="browser-settings-toggle" aria-label="打开设置">⚙</button>
    <aside id="browser-settings-panel">
      <div class="browser-settings-head"><div><strong>音域回响设置</strong><small id="browser-gpu-renderer">GPU · 检测中</small></div><button id="browser-settings-close">关闭</button></div>
      <div id="browser-settings-body"></div>
      <div class="browser-settings-foot"><button id="browser-settings-reset">恢复原版默认值</button></div>
    </aside>
  </body>
</html>
